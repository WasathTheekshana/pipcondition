name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Also run the test suite as part of this pipeline"
        type: boolean
        default: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

permissions:
  # contents: write is needed by the version-bump job (pushes a commit + tag);
  # issues: write is needed by deploy-preview's PR-comment step. Declaring
  # this explicitly means every other scope defaults to none, so both have
  # to be listed even though only one job each needs them.
  contents: write
  issues: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run ESLint
        run: yarn lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run TypeScript compiler
        run: yarn tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    # Skipped by default on regular pushes/PRs - use the standalone "Test"
    # workflow to run the suite anytime, or tick "run_tests" when manually
    # dispatching this pipeline to include it here too.
    if: github.event_name == 'workflow_dispatch' && inputs.run_tests == true
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run test suite
        run: yarn test

  version-bump:
    name: Bump version from conventional commits
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Determine version bump from pushed commits
        id: analyze
        uses: actions/github-script@v7
        with:
          script: |
            const commits = context.payload.commits || [];
            const rank = { patch: 1, minor: 2, major: 3 };
            let bump = null;

            for (const commit of commits) {
              const message = commit.message;
              const match = message.match(/^(\w+)(\([^)]*\))?(!)?:/);
              if (!match) continue;

              const type = match[1];
              const breaking = Boolean(match[3]) || /BREAKING CHANGE:/.test(message);

              let level = null;
              if (breaking) level = "major";
              else if (type === "feat") level = "minor";
              else if (type === "fix" || type === "perf") level = "patch";

              if (level && (!bump || rank[level] > rank[bump])) bump = level;
            }

            core.setOutput("bump", bump || "");

      - name: Bump package.json version
        if: steps.analyze.outputs.bump != ''
        run: npm version ${{ steps.analyze.outputs.bump }} --no-git-tag-version

      - name: Commit and tag the version bump
        if: steps.analyze.outputs.bump != ''
        run: |
          version=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v$version"
          git tag "v$version"
          git push origin HEAD:main
          git push origin "v$version"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, version-bump]
    # version-bump only runs for pushes to main and may be skipped for other
    # events (e.g. pull_request) - a skip must not block this job, only an
    # actual lint/typecheck failure should.
    if: always() && needs.lint.result == 'success' && needs.typecheck.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # version-bump may have just pushed a release commit to main - build
          # that commit (not the pre-bump one this workflow was triggered by)
          # so the deployed app's version banner is correct. Falls back to the
          # triggering commit for non-push events (e.g. pull_request), where
          # there's no bump to pick up and "main" wouldn't be the right ref anyway.
          ref: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'main' || github.sha }}

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build application
        run: yarn build

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> $GITHUB_OUTPUT

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Preview deployed to: ${{ steps.deploy.outputs.preview_url }}'
            })

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # This job's own `if:` guarantees we're on a push to main, so
          # "main" is always the right ref - picks up version-bump's commit
          # if it just pushed one, same as the build job above.
          ref: main

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
